<!DOCTYPE html>
<html>
<head>

<title>AI E-Commerce Intelligence</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:linear-gradient(135deg,#eef2ff,#f8fafc);
font-family:'Segoe UI',sans-serif;
color:#1e293b;
}

/* SIDEBAR */

.sidebar{
height:100vh;
width:230px;
background:#0f172a;
position:fixed;
padding-top:30px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.sidebar h4{
font-weight:700;
color:#38bdf8;
}

.sidebar a{
display:block;
padding:14px 25px;
color:#cbd5f5;
text-decoration:none;
font-size:15px;
transition:0.25s;
border-left:3px solid transparent;
}

.sidebar a:hover{
background:#1e293b;
border-left:3px solid #38bdf8;
color:white;
}

.sidebar a.active{
background:#1e293b;
border-left:3px solid #38bdf8;
color:white;
}

/* CONTENT */

.content{
margin-left:230px;
padding:35px;
}

/* CARDS */

.card{
border:none;
border-radius:16px;
background:white;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
padding:10px;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 40px rgba(0,0,0,0.12);
}

.kpi{
font-size:32px;
font-weight:700;
color:#2563eb;
}

.chart-box{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

table{
background:white;
border-radius:10px;
overflow:hidden;
}

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#94a3b8;
border-radius:4px;
}

.page-title{
font-weight:700;
margin-bottom:20px;
}

/* ================= AI CHATBOT ================= */

#aiButton{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
background:#2563eb;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
z-index:999;
}

#aiChat{
display:none;
position:fixed;
bottom:100px;
right:25px;
width:330px;
background:white;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
overflow:hidden;
z-index:999;
}

.ai-header{
background:#2563eb;
color:white;
padding:10px;
font-weight:bold;
display:flex;
justify-content:space-between;
}

#aiMessages{
height:250px;
overflow-y:auto;
padding:10px;
font-size:14px;
}

#aiInput{
width:70%;
border:none;
border-top:1px solid #ddd;
padding:10px;
}

#aiChat button{
width:30%;
border:none;
background:#2563eb;
color:white;
}

</style>

</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->

<div class="col-md-2 sidebar">

<h4 class="text-center mb-4">⚡ AI Panel</h4>

<a href="/dashboard">
<i class="fa fa-chart-line me-2"></i>Dashboard
</a>

<a href="/analytics">
<i class="fa fa-chart-pie me-2"></i>Analytics
</a>

<a href="/ai">
<i class="fa fa-brain me-2"></i>AI Insights
</a>

<a href="/recommendations">
<i class="fa fa-lightbulb me-2"></i>AI Recommendations
</a>

<a href="/users">
<i class="fa fa-users me-2"></i>Users
</a>

<hr style="border-color:#334155">

<a href="/logout" class="text-danger">
<i class="fa fa-sign-out-alt me-2"></i>Logout
</a>

</div>

<!-- CONTENT -->

<div class="col-md-10 content">

{% block content %}
{% endblock %}

</div>

</div>
</div>

<!-- AI CHATBOT BUTTON -->

<div id="aiChatButton" onclick="toggleAIChat()">
🤖
</div>

<div id="aiChatBox">

<div class="ai-header">
AI Assistant
<span onclick="toggleAIChat()">✖</span>
</div>

<div id="aiMessages"></div>

<div class="ai-input-box">
<input type="text" id="aiInput" placeholder="Ask AI..." />
<button onclick="sendAI()">Send</button>
</div>

</div>

<style>

#aiChatButton{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
background:#2563eb;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
z-index:999;
}

#aiChatBox{
display:none;
position:fixed;
bottom:100px;
right:25px;
width:320px;
background:white;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
overflow:hidden;
z-index:999;
}

.ai-header{
background:#2563eb;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
font-weight:bold;
}

#aiMessages{
height:250px;
overflow-y:auto;
padding:10px;
font-size:14px;
}

.ai-input-box{
display:flex;
border-top:1px solid #ddd;
}

.ai-input-box input{
flex:1;
border:none;
padding:10px;
}

.ai-input-box button{
border:none;
background:#2563eb;
color:white;
padding:10px 15px;
}

</style>

<script>

function toggleAIChat(){

let box = document.getElementById("aiChatBox");

if(box.style.display === "none"){
box.style.display = "block";
}
else{
box.style.display = "none";
}

}

function sendAI(){

let input = document.getElementById("aiInput").value;

fetch("/ai_chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:input})
})
.then(res=>res.json())
.then(data=>{

let messages = document.getElementById("aiMessages");

messages.innerHTML += "<p><b>You:</b> "+input+"</p>";
messages.innerHTML += "<p><b>AI:</b> "+data.reply+"</p>";

messages.scrollTop = messages.scrollHeight;

document.getElementById("aiInput").value="";

});

}

</script>

</body>
</html>
