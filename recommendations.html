{% extends "base.html" %}
{% block content %}

<h2 class="page-title">🧠 AI Product Recommendations</h2>

<div class="row">

{% for item in recommendations %}

<div class="col-md-4 mb-4">

<div class="card p-4">

<h4>{{ item.product }}</h4>

<p><b>Customers also buy:</b></p>

<ul>

{% for r in item.recommended %}

<li>{{ r }}</li>

{% endfor %}

</ul>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
